<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — AutoMail AI</title>
  <meta name="description" content="Sign in to AutoMail AI to manage your email outreach campaigns.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:       #00A86B;
      --green-light: #00C47E;
      --green-dark:  #008A58;
      --green-muted: rgba(0,168,107,0.08);
      --navy:        #0F172A;
      --navy-mid:    #1E293B;
      --white:       #FFFFFF;
      --bg:          #F8FAFC;
      --border:      #E5E7EB;
      --muted:       #64748B;
      --muted-light: #94A3B8;
      --rose:        #EF4444;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--navy);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Background ── */
    .login-bg {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 24px;
    }
    .bg-glow-1 {
      position: absolute;
      top: -200px; right: -160px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,168,107,0.10) 0%, transparent 65%);
      border-radius: 50%;
      pointer-events: none;
      animation: glow-pulse 6s ease-in-out infinite;
    }
    .bg-glow-2 {
      position: absolute;
      bottom: -150px; left: -120px;
      width: 480px; height: 480px;
      background: radial-gradient(circle, rgba(99,102,241,0.07) 0%, transparent 65%);
      border-radius: 50%;
      pointer-events: none;
      animation: glow-pulse 8s ease-in-out infinite reverse;
    }
    .bg-dots {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, #e2e8f0 1px, transparent 1px);
      background-size: 36px 36px;
      opacity: 0.55;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 100%);
      pointer-events: none;
    }

    @keyframes glow-pulse {
      0%,100% { opacity: 0.35; transform: scale(1); }
      50%      { opacity: 0.65; transform: scale(1.05); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-6px); }
      40%,80% { transform: translateX(6px); }
    }

    /* ── Card ── */
    .login-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      box-shadow: 0 24px 64px rgba(0,0,0,0.10), 0 8px 24px rgba(0,0,0,0.06);
      animation: fadeInUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--green), var(--green-light), #22c55e);
      border-radius: 24px 24px 0 0;
    }

    /* ── Logo ── */
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      justify-content: center;
    }
    .logo-mark {
      width: 38px; height: 38px;
      background: var(--green);
      border-radius: 11px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 14px rgba(0,168,107,0.30);
    }
    .logo-text {
      font-size: 20px; font-weight: 700; color: var(--navy);
      letter-spacing: -0.4px;
    }
    .logo-ai { color: var(--green); }

    /* ── Header ── */
    .login-head { text-align: center; margin-bottom: 32px; }
    .login-head h1 {
      font-size: 24px; font-weight: 800;
      color: var(--navy); letter-spacing: -0.6px;
      margin-bottom: 8px;
    }
    .login-head p { font-size: 14px; color: var(--muted); line-height: 1.6; }

    /* ── Form ── */
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 13px; font-weight: 600;
      color: var(--navy); margin-bottom: 7px;
    }
    .form-input-wrap {
      position: relative;
    }
    .form-input-icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted-light);
      display: flex; align-items: center;
    }
    .form-input-icon svg { width: 17px; height: 17px; }

    .form-input {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      font-family: var(--font);
      color: var(--navy);
      background: var(--bg);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input::placeholder { color: var(--muted-light); }
    .form-input:focus {
      border-color: var(--green);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(0,168,107,0.10);
    }
    .form-input.error {
      border-color: var(--rose);
      box-shadow: 0 0 0 3px rgba(239,68,68,0.10);
    }

    /* Password toggle */
    .toggle-pw {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      display: flex; align-items: center;
      padding: 2px;
    }
    .toggle-pw svg { width: 18px; height: 18px; }
    .toggle-pw:hover { color: var(--navy); }

    /* ── Error message ── */
    .error-msg {
      display: none;
      align-items: center;
      gap: 8px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.20);
      color: var(--rose);
      font-size: 13px; font-weight: 500;
      padding: 10px 14px;
      border-radius: 10px;
      margin-bottom: 18px;
    }
    .error-msg.show {
      display: flex;
      animation: shake 0.4s ease;
    }
    .error-msg svg { width: 15px; height: 15px; flex-shrink: 0; }

    /* ── Submit button ── */
    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--green);
      color: var(--white);
      border: none;
      border-radius: 12px;
      font-size: 15px; font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,168,107,0.30);
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }
    .btn-login:hover {
      background: var(--green-light);
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(0,168,107,0.40);
    }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled {
      opacity: 0.65; cursor: not-allowed;
      transform: none; box-shadow: none;
    }
    .btn-login svg { width: 16px; height: 16px; }

    /* Loading spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }

    /* ── Footer links ── */
    .login-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }
    .login-footer a {
      color: var(--green-dark);
      font-weight: 500;
      text-decoration: none;
      transition: color 0.15s;
    }
    .login-footer a:hover { color: var(--green); text-decoration: underline; }

    /* ── Security badge ── */
    .security-note {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 20px;
      font-size: 11px;
      color: var(--muted-light);
    }
    .security-note svg { width: 13px; height: 13px; }
  </style>
</head>
<body>
  <div class="login-bg">
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>
    <div class="bg-dots"></div>

    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <div class="logo-mark">⚡</div>
        <span class="logo-text">AutoMail <span class="logo-ai">AI</span></span>
      </div>

      <!-- Heading -->
      <div class="login-head">
        <h1>Welcome back</h1>
        <p>Sign in to your AutoMail AI dashboard to manage outreach campaigns.</p>
      </div>

      <!-- Error message -->
      <div class="error-msg" id="error-msg">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="error-text">Invalid username or password.</span>
      </div>

      <!-- Form -->
      <form id="login-form" autocomplete="on" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <div class="form-input-wrap">
            <span class="form-input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input
              type="text"
              id="username"
              name="username"
              class="form-input"
              placeholder="Enter your username"
              autocomplete="username"
              required
            >
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="form-input-wrap">
            <span class="form-input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            >
            <button type="button" class="toggle-pw" id="toggle-pw" title="Show/hide password">
              <svg id="eye-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="eye-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login" id="btn-login">
          <div class="spinner" id="spinner"></div>
          <span class="btn-text">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            Login to Dashboard
          </span>
        </button>
      </form>

      <!-- Footer -->
      <div class="login-footer">
        <a href="/">← Back to Home</a>
      </div>

      <!-- Security note -->
      <div class="security-note">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Secured by OnIT India
      </div>
    </div>
  </div>

  <script>
    // ── Check if already logged in ──────────────────────────
    const stored = localStorage.getItem('automail_token');
    if (stored) {
      fetch('/api/auth/check', {
        headers: { 'Authorization': `Bearer ${stored}` }
      }).then(r => r.json()).then(d => {
        if (d.authenticated) {
          const params = new URLSearchParams(window.location.search);
          window.location.href = params.get('next') || '/dashboard';
        } else {
          localStorage.removeItem('automail_token');
        }
      }).catch(() => localStorage.removeItem('automail_token'));
    }

    // ── Password toggle ─────────────────────────────────────
    const pwInput  = document.getElementById('password');
    const eyeShow  = document.getElementById('eye-show');
    const eyeHide  = document.getElementById('eye-hide');
    document.getElementById('toggle-pw').addEventListener('click', () => {
      const isText = pwInput.type === 'text';
      pwInput.type = isText ? 'password' : 'text';
      eyeShow.style.display = isText ? '' : 'none';
      eyeHide.style.display = isText ? 'none' : '';
    });

    // ── Form submit ─────────────────────────────────────────
    const form    = document.getElementById('login-form');
    const btnLogin = document.getElementById('btn-login');
    const errorMsg = document.getElementById('error-msg');
    const errorText= document.getElementById('error-text');
    const spinner  = document.getElementById('spinner');

    function showError(msg) {
      errorText.textContent = msg;
      errorMsg.classList.add('show');
      document.getElementById('username').classList.add('error');
      document.getElementById('password').classList.add('error');
    }
    function clearError() {
      errorMsg.classList.remove('show');
      document.getElementById('username').classList.remove('error');
      document.getElementById('password').classList.remove('error');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !password) {
        showError('Please enter both username and password.');
        return;
      }

      // Show loading state
      btnLogin.disabled = true;
      btnLogin.classList.add('loading');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          credentials: 'include',
        });
        const data = await res.json();

        if (data.success && data.token) {
          // Store token
          localStorage.setItem('automail_token', data.token);
          // Redirect to dashboard (or intended page)
          const params = new URLSearchParams(window.location.search);
          window.location.href = params.get('next') || '/dashboard';
        } else {
          showError(data.error || 'Invalid username or password.');
          btnLogin.disabled = false;
          btnLogin.classList.remove('loading');
        }
      } catch (err) {
        showError('Connection error. Please try again.');
        btnLogin.disabled = false;
        btnLogin.classList.remove('loading');
      }
    });

    // Clear error on input
    ['username', 'password'].forEach(id => {
      document.getElementById(id).addEventListener('input', clearError);
    });
  </script>
</body>
</html>
