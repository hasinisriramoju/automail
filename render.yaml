services:
  - type: web
    name: autoemail-platform
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: OLLAMA_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: OLLAMA_MODEL
        value: llama-3.1-8b-instant
      - key: OLLAMA_API_KEY
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SENDER_NAME
        value: OnIT India
      - key: SENDER_EMAIL
        sync: false
      - key: RATE_LIMIT_AI
        value: "30"
      - key: RATE_LIMIT_SEND
        value: "20"
      - key: CAMPAIGN_DELAY_MS
        value: "3000"
      - key: MAX_RETRY_ATTEMPTS
        value: "3"
      - key: RETRY_BASE_DELAY_MS
        value: "1000"
